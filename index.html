<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Aquapark Slides</title>
  <link href="shared/style.css" rel="stylesheet" />
  <link rel="stylesheet" href="TemplateData56/style.css" />
  <script src="TemplateData56/UnityProgress.js"></script>
  <link rel="icon" href="splash.png" />

  <link rel="shortcut icon" href="TemplateData/favicon.ico" />
  <script src="Build/UnityLoader.js"></script>
  <script>
    window.origBlob = window.Blob;
    window.Blob = function (array, options) {
      if (array[1] instanceof Uint8Array) {
        array[1] = new TextDecoder("utf-8").decode(array[1]).replace(/window\.top\.location\.href|window\.location\.href|document\.referrer|document\.URL/g, '"https://storage.y8.com/"');
      }
      return new window.origBlob(array, options);
    };
    var gameInstance = UnityLoader.instantiate("gameContainer", "Build/WaterParkSlides3Dx2.json", {
      onProgress: UnityProgress,
      Module: {
        onRuntimeInitialized: function () {
          UnityProgress(gameInstance, "complete");
        },
      },
    });
  </script>
  <script>
    (function () {
      'use strict';

      // 1. Ocultar el anuncio usando estilos CSS de inmediato
      const style = document.createElement('style');
      style.innerHTML = `
        .AdsPlaceholderDiv, .skipAdButton, .skipAdTimer { 
            display: none !important; 
            pointer-events: none !important;
            visibility: hidden !important;
        }
    `;
      document.head.appendChild(style);

      // 2. Intentar skipear haciendo clic automático cada 200 milisegundos
      const autoSkip = setInterval(() => {
        const skipButton = document.querySelector('.skipAdButton');
        const adContainer = document.querySelector('.AdsPlaceholderDiv');

        if (skipButton) {
          skipButton.click(); // Hace clic en el botón de saltar
        }

        if (adContainer) {
          adContainer.remove(); // Borra el anuncio por completo del mapa
        }
      }, 200);

      // Detener el bucle después de 10 segundos para no gastar recursos
      setTimeout(() => clearInterval(autoSkip), 10000);
    })();

  </script>
</head>

<body style="overflow: hidden;">
  <div class="webgl-content">
    <div id="gameContainer" style="width: 100vw; height: 100vh;"></div>
  </div>
</body>

</html>
